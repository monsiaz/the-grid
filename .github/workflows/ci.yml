# Minimal CI: typecheck + lint on every push/PR; optional full build on demand (needs repo secrets).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run pnpm build (requires DATABASE_URL, PAYLOAD_SECRET, and other secrets in repo Settings → Secrets)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Must match package.json engines.node (24.x) or pnpm install can fail. Skip cache: pnpm cache on setup-node failed with our lockfile.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint .

  # Mirrors Vercel build; only runs when manually triggered with "run_build" checked.
  # Add secrets in GitHub: Settings → Secrets and variables → Actions (same names as Vercel env).
  build:
    needs: quality
    # workflow_dispatch boolean inputs are strings in GitHub-hosted runners
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Must match package.json engines.node (24.x) or pnpm install can fail. Skip cache: pnpm cache on setup-node failed with our lockfile.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: pnpm install --frozen-lockfile

      - name: Production build
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
